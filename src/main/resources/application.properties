# ============================================================
# PipelinePredict IA - API Java Spring Boot
# Perfil local usando PostgreSQL en Docker expuesto por localhost
# ============================================================

spring.application.name=${SPRING_APPLICATION_NAME:pipelinepredict-api}
server.port=${SERVER_PORT:8080}

# ============================================================
# PostgreSQL
# ============================================================

spring.datasource.url=${API_DB_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pipelinepredict}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pipelinepredict123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Define el schema por defecto al abrir la conexión
spring.datasource.hikari.connection-init-sql=SET search_path TO pipelinepredict

# ============================================================
# Pool de conexiones HikariCP
# ============================================================

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# Logs
# ============================================================

logging.level.root=INFO
logging.level.cl.inacap.pipelinepredict=DEBUG
logging.level.org.springframework.jdbc.core=INFO
logging.level.com.zaxxer.hikari=INFO

# ============================================================
# Actuator
# ============================================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

# ============================================================
# Swagger / OpenAPI
# ============================================================

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ============================================================
# JSON
# ============================================================

spring.jackson.serialization.indent-output=true
spring.jackson.time-zone=America/Santiago
